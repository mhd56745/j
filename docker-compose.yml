version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: root_password_change_me
      MYSQL_DATABASE: iptv_panel
      MYSQL_USER: iptv_user
      MYSQL_PASSWORD: iptv_password_change_me
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (optional - for caching/sessions)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # Backend API (Laravel + Nginx with RTMP)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"      # Web panel & API
      - "1935:1935"  # RTMP
      - "8080:8080"  # HLS & RTMP stats
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_HOST=db
      - DB_DATABASE=iptv_panel
      - DB_USERNAME=iptv_user
      - DB_PASSWORD=iptv_password_change_me
      - REDIS_HOST=redis
      - RTMP_SERVER=localhost
      - RTMP_PORT=1935
    volumes:
      - hls_data:/app/storage/app/hls
      - recording_data:/app/storage/app/recordings
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  mysql_data:
  hls_data:
  recording_data: