version: '3.8'

services:
  iptv-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iptv-restream
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DB_PATH=/app/data/iptv.db
    volumes:
      - iptv-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  iptv-nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: iptv-nginx
    ports:
      - "8080:8080"   # HTTP proxy
      - "1935:1935"   # RTMP
    depends_on:
      - iptv-server
    volumes:
      - iptv-data:/app/data
    restart: unless-stopped

volumes:
  iptv-data: