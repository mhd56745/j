worker_processes auto;
pid /tmp/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 500;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 30;
    client_max_body_size 10m;
    server_tokens off;
    reset_timedout_connection on;

    access_log off;

    gzip on;
    gzip_vary on;
    gzip_comp_level 1;
    gzip_types text/plain text/css application/json application/javascript;

    proxy_cache_path /tmp/nginx_cache levels=1:2
        keys_zone=iptv:256m max_size=1g inactive=10m use_temp_path=off;

    limit_req_zone $binary_remote_addr zone=api:5m rate=20r/s;
    limit_conn_zone $binary_remote_addr zone=connlimit:5m;

    upstream admin {
        server 127.0.0.1:3000;
        keepalive 16;
    }

    server {
        listen 8080;
        server_name _;

        location / {
            proxy_pass http://admin;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        include /etc/nginx/stream.conf;

        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        limit_conn connlimit 15;
        limit_req zone=api burst=30 nodelay;
    }
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        buflen 3s;
        # Add RTMP push applications here
    }
}